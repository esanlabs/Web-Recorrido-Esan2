﻿<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <title>Tour ESAN 360 - Experiencia VR Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <script src="https://unpkg.com/aframe-troika-text/dist/aframe-troika-text.min.js"></script>

    <script
        src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>

    <style>
        :root {
            /* Tipografía */
            --font-titulo: 'Bricolage Grotesque', sans-serif;
            --font-cuerpo: 'Inter', sans-serif;
            /* Colores corporativos ESAN */
            --color-primario:   #E3173E;   /* RGB 227,23,62  */
            --color-secundario: #696A6D;   /* RGB 105,106,109 */
            --color-negro:      #000000;
            --color-blanco:     #FFFFFF;
        }
        * { font-family: var(--font-cuerpo); }

        #pantalla-carga {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--color-negro);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 0;
            transition: opacity 1s ease, transform 1s ease;
        }

        .oculto {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.1);
        }

        /* btn-menu-2d oculto — reemplazado por panel lateral */
        #btn-menu-2d { display: none; }

        #btn-capturar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background-color: #E3173E;
            color: white;
            border: 2px solid white;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        #btn-capturar:hover {
            background-color: #00BFFF;
        }

        .a-enter-vr #btn-menu-2d,
        .a-enter-vr #btn-capturar {
            display: none;
        }
        #dbg-panel {
            position: fixed; bottom: 12px; left: 12px;
            background: rgba(0,0,0,0.75); color: #00FF88;
            font-family: monospace; font-size: 13px;
            padding: 8px 12px; border-radius: 6px;
            z-index: 9999; pointer-events: none;
            display: none; line-height: 1.7;
        }
        #dbg-panel.on { display: block; }
        #dbg-btn {
            position: fixed; bottom: 12px; right: 12px;
            background: rgba(0,0,0,0.75); color: #00FF88;
            font-family: monospace; font-size: 12px;
            padding: 6px 12px; border-radius: 6px;
            z-index: 9999; cursor: pointer;
            border: 1px solid #00FF88;
        }

        /* ── 2D INFO CARD ─────────────────────────────────────── */
        :root {
            --esan-red:    var(--color-primario);
            --esan-gray:   var(--color-secundario);
            --esan-dark:   #1a1a2e;
            --radius-card: 18px;
            --shadow-card: 0 24px 64px rgba(0,0,0,0.45);
        }
        #card-backdrop {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 2000;
            opacity: 0; pointer-events: none;
            transition: opacity .25s ease;
        }
        #card-backdrop.visible { opacity: 1; pointer-events: all; }

        #info-card-2d {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -44%) scale(0.94);
            width: min(420px, 92vw);
            background: #fff;
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-card);
            overflow: hidden;
            z-index: 2001;
            opacity: 0; pointer-events: none;
            transition: opacity .28s ease, transform .28s cubic-bezier(.34,1.56,.64,1);
        }
        #info-card-2d.visible {
            opacity: 1; pointer-events: all;
            transform: translate(-50%, -50%) scale(1);
        }
        .ic-img-wrap {
            position: relative;
            width: 100%; height: 170px;
            overflow: hidden;
            background: linear-gradient(135deg, #E3173E 0%, #7a0020 100%);
        }
        .ic-img-wrap img {
            width: 100%; height: 100%;
            object-fit: cover; object-position: center;
            display: block;
            filter: brightness(0.82);
        }
        .ic-img-logo {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .ic-img-logo span {
            color: rgba(255,255,255,0.18);
            font-size: 80px; font-weight: 900;
            font-family: var(--font-cuerpo);
            letter-spacing: -4px; user-select: none;
        }
        .ic-close {
            position: absolute; top: 12px; right: 12px;
            width: 34px; height: 34px;
            background: rgba(0,0,0,0.55);
            border: none; border-radius: 50%;
            color: #fff; font-size: 16px;
            cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            transition: background .18s;
            z-index: 10;
        }
        .ic-close:hover { background: var(--esan-red); }
        .ic-body {
            padding: 20px 24px 24px;
        }
        .ic-title {
            font-family: var(--font-titulo);
            font-size: 17px; font-weight: 700;
            color: var(--esan-red);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin: 0 0 10px; line-height: 1.3;
        }
        .ic-desc {
            font-family: var(--font-cuerpo);
            font-size: 13.5px; color: var(--color-secundario);
            line-height: 1.65; margin: 0;
        }
        .ic-divider {
            height: 3px;
            background: linear-gradient(90deg, var(--esan-red) 0%, transparent 100%);
            border-radius: 2px; margin-bottom: 14px;
        }

        /* ── SIDE NAV ─────────────────────────────────────────── */
        #sidenav {
            position: fixed; top: 0; left: 0;
            width: 230px; height: 100%;
            background: var(--color-blanco);
            border-right: 1px solid rgba(105,106,109,0.2);
            z-index: 3000;
            display: flex; flex-direction: column;
            transform: translateX(0);
            transition: transform 0.3s ease;
            box-shadow: 4px 0 20px rgba(0,0,0,0.10);
        }
        #sidenav.cerrado { transform: translateX(-230px); }
        #sidenav-toggle {
            position: absolute; top: 50%; right: -26px;
            transform: translateY(-50%);
            width: 26px; height: 52px;
            background: var(--color-blanco);
            border: 1px solid rgba(105,106,109,0.2); border-left: none;
            border-radius: 0 8px 8px 0;
            color: var(--color-negro); cursor: pointer; font-size: 13px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 4px 0 8px rgba(0,0,0,0.08);
        }
        /* H1 — Título principal del panel */
        .sidenav-logo {
            padding: 20px 16px 16px;
            background: var(--color-primario);
            font-family: var(--font-titulo);
            font-size: 15px; font-weight: 700;
            color: var(--color-blanco); letter-spacing: 1px; text-transform: uppercase;
            flex-shrink: 0;
        }
        .sidenav-logo span { color: var(--color-blanco); opacity: 0.85; }
        .sidenav-body {
            flex: 1; overflow-y: auto; overflow-x: hidden;
        }
        .sidenav-body::-webkit-scrollbar { width: 3px; }
        .sidenav-body::-webkit-scrollbar-thumb { background: rgba(105,106,109,0.3); border-radius: 2px; }
        /* H2 — Subtítulos de categoría */
        .sidenav-cat-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 9px 14px 8px;
            background: rgba(105,106,109,0.10);
            color: var(--color-secundario);
            font-family: var(--font-cuerpo);
            font-size: 10px; font-weight: 700;
            letter-spacing: 1.8px; text-transform: uppercase;
            cursor: pointer;
            border-top: 1px solid rgba(105,106,109,0.12);
            border-bottom: 1px solid rgba(105,106,109,0.12);
            transition: background 0.2s, color 0.2s; user-select: none;
        }
        .sidenav-cat-header:hover { background: rgba(227,23,62,0.07); color: var(--color-primario); }
        .sidenav-cat-arrow { transition: transform 0.2s; font-size: 8px; }
        .sidenav-cat.cerrada .sidenav-cat-arrow { transform: rotate(-90deg); }
        .sidenav-items { overflow: hidden; }
        .sidenav-cat.cerrada .sidenav-items { display: none; }
        /* H3 — Items de navegación */
        .sidenav-item {
            width: 100%; text-align: left;
            padding: 9px 14px 9px 20px;
            background: none; border: none;
            border-left: 3px solid transparent;
            color: var(--color-negro);
            font-family: var(--font-cuerpo); font-size: 13px; font-weight: 400;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }
        .sidenav-item:hover { background: rgba(227,23,62,0.06); color: var(--color-primario); }
        .sidenav-item.activo {
            background: rgba(227,23,62,0.08);
            border-left-color: var(--color-primario);
            color: var(--color-primario); font-weight: 700;
        }
        .sidenav-footer {
            padding: 10px 14px 14px;
            border-top: 1px solid rgba(105,106,109,0.15);
            flex-shrink: 0;
        }
        .sidenav-link {
            display: flex; align-items: center; gap: 6px;
            color: var(--color-secundario);
            font-size: 11.5px; font-family: var(--font-cuerpo); font-weight: 400;
            text-decoration: none; padding: 7px 0;
            transition: color 0.2s;
        }
        .sidenav-link:hover { color: var(--color-primario); }

        /* ── 2D FLECHAS ───────────────────────────────────────── */
        #flechas-2d-overlay {
            position: fixed; inset: 0; pointer-events: none; z-index: 10;
        }
        #loading-bar {
            position: fixed; bottom: 0; left: 0; height: 3px; width: 0%;
            background: linear-gradient(90deg, #E3173E, #FF7070);
            z-index: 200; display: none; opacity: 1;
        }
        .flecha-2d {
            position: absolute; transform: translate(-50%, -50%);
            pointer-events: auto; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            filter: drop-shadow(0 1px 4px rgba(0,0,0,0.8)) drop-shadow(0 3px 6px rgba(0,0,0,0.5));
        }
        .flecha-label {
            background: rgba(30,30,30,0.82); color: #fff;
            border-radius: 7px; padding: 3px 12px;
            font-size: 12px; font-weight: bold; white-space: nowrap;
            font-family: Arial, sans-serif;
            opacity: 0; transition: opacity 0.18s ease;
            pointer-events: none;
        }
        .flecha-2d:hover .flecha-label { opacity: 1; }

        /* ── 2D HOTSPOTS ──────────────────────────────────────── */
        #hotspots-2d-overlay {
            position: fixed; inset: 0; pointer-events: none; z-index: 11;
        }
        .hotspot-2d {
            position: absolute; transform: translate(-50%, -50%);
            pointer-events: auto; cursor: pointer;
        }
        @keyframes hotspot-jump {
            0%, 100% { transform: translate(-50%, -50%) translateY(0); }
            40%       { transform: translate(-50%, -50%) translateY(-5px); }
            70%       { transform: translate(-50%, -50%) translateY(-2px); }
        }
        .hotspot-2d:hover { animation: hotspot-jump 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) infinite; }
        /* ── YOUTUBE MODAL ───────────────────────────── */
        #yt-modal {
            display: none; position: fixed; inset: 0; z-index: 3500;
            align-items: center; justify-content: center;
        }
        #yt-modal.visible { display: flex; }
        #yt-backdrop {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.88);
            backdrop-filter: blur(6px);
        }
        #yt-box {
            position: relative; z-index: 1;
            width: min(900px, 94vw);
            aspect-ratio: 16/9;
            border-radius: 10px; overflow: hidden;
            box-shadow: 0 8px 40px rgba(0,0,0,0.7);
        }
        #yt-iframe { width: 100%; height: 100%; border: none; display: block; }
        #yt-close {
            position: absolute; top: -44px; right: 0;
            background: rgba(255,255,255,0.15); border: none;
            color: #fff; font-size: 20px; width: 36px; height: 36px;
            border-radius: 50%; cursor: pointer; transition: background 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        #yt-close:hover { background: var(--color-primario); }
        /* ── VIDEO 360 MODAL (visor propio, no iframe) ─── */
        #video360-modal {
            display: none; position: fixed; inset: 0; z-index: 3500;
            align-items: center; justify-content: center;
        }
        #video360-modal.visible { display: flex; }
        #video360-backdrop {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.88);
            backdrop-filter: blur(6px);
        }
        #video360-box {
            position: relative; z-index: 1;
            width: min(900px, 94vw);
            aspect-ratio: 16/9;
            border-radius: 10px; overflow: hidden;
            box-shadow: 0 8px 40px rgba(0,0,0,0.7);
            background: #000;
        }
        #video360-canvas { width: 100%; height: 100%; display: block; cursor: grab; }
        #video360-canvas:active { cursor: grabbing; }
        #video360-close {
            position: absolute; top: -44px; right: 0;
            background: rgba(255,255,255,0.15); border: none;
            color: #fff; font-size: 20px; width: 36px; height: 36px;
            border-radius: 50%; cursor: pointer; transition: background 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        #video360-close:hover { background: var(--color-primario); }
        #video360-hint {
            position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
            color: #fff; font-size: 12px; background: rgba(0,0,0,0.5);
            padding: 5px 12px; border-radius: 20px; pointer-events: none;
            font-family: var(--font-cuerpo, sans-serif);
        }
        @keyframes spin360 { to { transform: rotate(360deg); } }
        @keyframes loadBar {
            0%   { width: 0%; margin-left: 0; }
            50%  { width: 100%; margin-left: 0; }
            100% { width: 0%; margin-left: 100%; }
        }
        #freeze-overlay::after {
            content: ''; position: absolute; inset: 0;
            background: rgba(0,0,0,0.38);
        }
        #transition-overlay {
            position: fixed; bottom: 22px; right: 22px;
            z-index: 70; display: none; pointer-events: none;
            align-items: center; gap: 10px;
            background: rgba(0,0,0,0.62);
            border-radius: 30px; padding: 10px 16px 10px 12px;
        }
        #transition-overlay.activo { display: flex; }
        #transition-spinner {
            width: 22px; height: 22px;
            border: 3px solid rgba(255,255,255,0.25);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin360 0.7s linear infinite;
            flex-shrink: 0;
        }
        #transition-label {
            color: rgba(255,255,255,0.88);
            font-size: 12px; font-family: sans-serif;
            letter-spacing: 0.04em; white-space: nowrap;
        }

    </style>

    <script>
        const nombresDestinos = {
            'fuera': 'Exterior ESAN',
            'entrada': 'Entrada Principal', 'jardin': 'Jardin', 'fuente': 'Fuente',
            'capilla': 'Capilla', 'fablab': 'FabLab 1', 'fablab2': 'FabLab 2',
            'voley': 'Cancha de Voley', 'basquet': 'Cancha de Basquet',
            'explanada': 'Explanada Convention', 'eventos': 'Eventos',
            'butacas': 'Butacas', 'biblioteca': 'Biblioteca', 'danza': 'Danza',
            'edificioD': 'Edificio D', 'conducta': 'Lab Conducta', 'edificioA': 'Edificio A',
            'ecoesan': 'EcoESAN', 'aula': 'Aula', 'laboratorio': 'Lab de Computo',
            'datalab': 'Data Lab', 'cafeteria': 'Cafeteria', 'cafeteriaa': 'Cafeteria', 'cafeteria_interior': 'Cafeteria Interior',
            'fisica': 'Lab de Fisica', 'quimica': 'Lab de Quimica',
            'estudio_pregrado': 'Sala Estudio Pregrado', 'estudio_mba': 'Sala Estudio MBA',
            'estudio_magister': 'Sala Estudio Magister', 'descanso_magister': 'Sala Descanso Magister',
            'robotica': 'Lab Robotica'
        };

        AFRAME.registerGeometry('rounded-rect', {
            schema: { width: { default: 1 }, height: { default: 1 }, radius: { default: 0.05 } },
            init: function (data) {
                var shape = new THREE.Shape();
                var w = data.width / 2, h = data.height / 2, r = Math.min(data.radius, w, h);
                shape.moveTo(-w + r, -h);
                shape.lineTo(w - r, -h);
                shape.quadraticCurveTo(w, -h, w, -h + r);
                shape.lineTo(w, h - r);
                shape.quadraticCurveTo(w, h, w - r, h);
                shape.lineTo(-w + r, h);
                shape.quadraticCurveTo(-w, h, -w, h - r);
                shape.lineTo(-w, -h + r);
                shape.quadraticCurveTo(-w, -h, -w + r, -h);
                this.geometry = new THREE.ShapeGeometry(shape, 8);
            }
        });

        AFRAME.registerComponent('rotate-with-camera', {
            init: function () {
                this._camEl = null;
            },
            tick: function () {
                if (!this.el.sceneEl.camera) return;
                if (!this._camEl) this._camEl = document.querySelector('[camera]');
                var camRot = this._camEl && this._camEl.getAttribute('rotation');
                if (camRot) this.el.setAttribute('rotation', { x: 0, y: camRot.y, z: 0 });
            }
        });
        

        AFRAME.registerComponent('card-style', {
            init: function () {
                var panel = this.el;
                setTimeout(function () {
                    var bgPlane = panel.querySelector('a-plane:not(.close-btn)');
                    if (!bgPlane) return;
                    var w = parseFloat(bgPlane.getAttribute('width') || 4);
                    bgPlane.parentNode.removeChild(bgPlane);

                    var PAD_V = 0.22, GAP = 0.22;

                    function mkPlane(color, width, height, px, py, pz, opacity, transparent) {
                        var p = document.createElement('a-plane');
                        p.setAttribute('color', color);
                        p.setAttribute('width', width);
                        p.setAttribute('height', height);
                        p.setAttribute('position', px + ' ' + py + ' ' + pz);
                        p.setAttribute('opacity', opacity);
                        p.setAttribute('shader', 'flat');
                        if (transparent) p.setAttribute('transparent', 'true');
                        return p;
                    }

                    function mkTroika(value, color, fontSize, maxW) {
                        var e = document.createElement('a-entity');
                        e.setAttribute('troika-text', {
                            value: value, color: color,
                            fontSize: fontSize, maxWidth: maxW,
                            textAlign: 'center', anchorX: 'center', anchorY: 'top'
                        });
                        return e;
                    }

                    function getTxtH(el) {
                        var comp = el.components && el.components['troika-text'];
                        if (!comp || !comp.troikaTextMesh || !comp.troikaTextMesh.textRenderInfo) return null;
                        var bb = comp.troikaTextMesh.textRenderInfo.blockBounds;
                        if (!bb) return null;
                        return Array.isArray(bb) ? Math.abs(bb[3] - bb[1])
                                                 : Math.abs((bb.top || 0) - (bb.bottom || 0));
                    }

                    var texts = Array.from(panel.querySelectorAll('a-text')).filter(function (t) {
                        var par = t.parentElement;
                        while (par && par !== panel) {
                            if (par.classList && par.classList.contains('close-btn')) return false;
                            par = par.parentElement;
                        }
                        return true;
                    });

                    var titleEl = null, descEl = null;
                    if (texts[0]) {
                        titleEl = mkTroika(texts[0].getAttribute('value') || '', '#E3173E', 0.22, w - 0.4);
                        panel.appendChild(titleEl);
                        texts[0].parentNode.removeChild(texts[0]);
                    }
                    if (texts[1]) {
                        descEl = mkTroika(texts[1].getAttribute('value') || '', '#333333', 0.20, w - 0.4);
                        panel.appendChild(descEl);
                        texts[1].parentNode.removeChild(texts[1]);
                    }

                    var attempts = 0;
                    function build() {
                        var th = titleEl ? getTxtH(titleEl) : 0;
                        var dh = descEl  ? getTxtH(descEl)  : 0;
                        if (attempts++ < 300 && ((titleEl && th === null) || (descEl && dh === null))) {
                            requestAnimationFrame(build); return;
                        }
                        th = th || (titleEl ? 0.34 : 0);
                        dh = dh || (descEl  ? 0.24 : 0);

                        var contentH = th + (dh > 0 ? GAP + dh : 0);
                        var h = contentH + PAD_V * 2;
                        var titleY = h / 2 - PAD_V;

                        if (titleEl) titleEl.setAttribute('position', '0 ' + titleY.toFixed(3) + ' 0.06');
                        if (descEl)  descEl.setAttribute('position',  '0 ' + (titleY - th - GAP).toFixed(3) + ' 0.06');

                        panel.appendChild(mkPlane('#000000', (w+0.30).toFixed(2), (h+0.30).toFixed(2), '0.10','-0.10','-0.05','0.30',true));
                        panel.appendChild(mkPlane('#E3173E', (w+0.16).toFixed(2), (h+0.16).toFixed(2), '0','0','-0.02','1',false));
                        panel.appendChild(mkPlane('#FFFFFF', w, h.toFixed(2), '0','0','-0.01','1',false));

                        var closeBtn = panel.querySelector('.close-btn');
                        if (closeBtn) closeBtn.setAttribute('position',
                            (w/2+0.10).toFixed(2) + ' ' + (h/2+0.10).toFixed(2) + ' 0.04');
                    }
                    requestAnimationFrame(build);
                }, 0);
            }
        });

        AFRAME.registerComponent('smooth-follow', {
            init: function () {
                this._cam = null;
            },
            tick: function () {
                if (!this.el.object3D.visible) return;
                if (!this._cam) {
                    var el = document.querySelector('#camara-principal');
                    if (!el) return;
                    this._cam = el.object3D;
                }
                var cam = this._cam;
                var targetPos = new THREE.Vector3(0, 0, -11);
                targetPos.applyMatrix4(cam.matrixWorld);
                var camWorldPos = new THREE.Vector3();
                cam.getWorldPosition(camWorldPos);
                targetPos.y = camWorldPos.y - 0.3;
                this.el.object3D.position.copy(targetPos);
                var lookAtPos = new THREE.Vector3().copy(camWorldPos);
                lookAtPos.y = this.el.object3D.position.y;
                this.el.object3D.lookAt(lookAtPos);
            }
        });

        AFRAME.registerComponent('hotspot-info', {
            schema: {
                target: { type: 'string' },
                action: { type: 'string', default: 'toggle' }
            },
            init: function () {
                var el = this.el;
                var data = this.data;

                el.addEventListener('click', function (evt) {
                    evt.stopPropagation();

        function resetYtScreenHover() {
            document.querySelectorAll('.yt-screen-3d .clickable').forEach(function (p) {

            });
        }

        var _v360 = { renderer: null, scene: null, camera: null, raf: null, lon: 0, lat: 0, isDown: false, lastX: 0, lastY: 0, resizeHandler: null };

        function _v360Render() {
            _v360.raf = requestAnimationFrame(_v360Render);
            var phi = (90 - _v360.lat) * Math.PI / 180;
            var theta = _v360.lon * Math.PI / 180;
            var target = new THREE.Vector3(
                500 * Math.sin(phi) * Math.cos(theta),
                500 * Math.cos(phi),
                500 * Math.sin(phi) * Math.sin(theta)
            );
            _v360.camera.lookAt(target);
            _v360.renderer.render(_v360.scene, _v360.camera);
        }

        function abrirVideo360(videoElId) {
            if (_transitioning) return;
            var video = document.getElementById(videoElId);
            var modal = document.getElementById('video360-modal');
            var canvas = document.getElementById('video360-canvas');
            if (!video || !modal || !canvas) return;

            video.onerror = function () {
                var err = video.error;
                alert('Error al cargar el video 360 (code ' + (err && err.code) + '): ' + (err && err.message));
            };

            var mainScene = document.querySelector('a-scene');
            if (mainScene && mainScene.pause) mainScene.pause();
            modal.classList.add('visible');

            if (!_v360.renderer) {
                _v360.renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
                _v360.scene = new THREE.Scene();
                _v360.camera = new THREE.PerspectiveCamera(80, 16 / 9, 0.1, 1000);
                var geometry = new THREE.SphereGeometry(500, 60, 40);
                geometry.scale(-1, 1, 1);
                var texture = new THREE.VideoTexture(video);
                var material = new THREE.MeshBasicMaterial({ map: texture });
                _v360.scene.add(new THREE.Mesh(geometry, material));

                var drag = function (clientX, clientY) {
                    var dx = clientX - _v360.lastX, dy = clientY - _v360.lastY;
                    _v360.lastX = clientX; _v360.lastY = clientY;
                    _v360.lon -= dx * 0.2;
                    _v360.lat = Math.max(-85, Math.min(85, _v360.lat + dy * 0.2));
                };
                canvas.addEventListener('mousedown', function (e) { _v360.isDown = true; _v360.lastX = e.clientX; _v360.lastY = e.clientY; });
                window.addEventListener('mousemove', function (e) { if (_v360.isDown) drag(e.clientX, e.clientY); });
                window.addEventListener('mouseup', function () { _v360.isDown = false; });
                canvas.addEventListener('touchstart', function (e) { _v360.isDown = true; _v360.lastX = e.touches[0].clientX; _v360.lastY = e.touches[0].clientY; });
                window.addEventListener('touchmove', function (e) { if (_v360.isDown) { drag(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); } }, { passive: false });
                window.addEventListener('touchend', function () { _v360.isDown = false; });
            }

            function resize() {
                var w = canvas.clientWidth, h = canvas.clientHeight;
                if (!w || !h) return;
                _v360.renderer.setSize(w, h, false);
                _v360.camera.aspect = w / h;
                _v360.camera.updateProjectionMatrix();
            }
            resize();
            if (_v360.resizeHandler) window.removeEventListener('resize', _v360.resizeHandler);
            _v360.resizeHandler = resize;
            window.addEventListener('resize', _v360.resizeHandler);

            try { video.currentTime = 0; } catch (e) {}
            video.play().catch(function (err) {
                alert('No se pudo reproducir el video 360: ' + err.name + ' - ' + err.message);
            });

            if (_v360.raf) cancelAnimationFrame(_v360.raf);
            _v360Render();
        }

        function cerrarVideo360() {
            var modal = document.getElementById('video360-modal');
            modal.classList.remove('visible');
            if (_v360.raf) { cancelAnimationFrame(_v360.raf); _v360.raf = null; }
            document.querySelectorAll('video').forEach(function (v) { if (v.id && v.id.indexOf('video-') === 0) v.pause(); });
            var mainScene = document.querySelector('a-scene');
            if (mainScene && mainScene.play) mainScene.play();
            resetYtScreenHover();
        }

                    var grupo = el.parentNode;

                    if (grupo && grupo.object3D && !grupo.object3D.visible) return;
                    if (video360) {
                        abrirVideo360(video360);

        function iniciarTransicion(nombreEscena, direccionDeseada) {
            if (_transitioning) return;
            _transitioning = true;
            hideCard2D();
            cerrarYoutube();
            cerrarVideo360();
            document.querySelectorAll('.yt-screen-3d').forEach(function(s) {
                s.setAttribute('visible', 'false');
                s.querySelectorAll('.clickable').forEach(function (p) { p.classList.remove('clickable'); });
            });
            var datos = escenas[nombreEscena];
            if (!datos) { _transitioning = false; return; }

            var contenedorFlechas = document.querySelector('#flechas-container');
            var cieloFondo        = document.querySelector('#cielo-fondo');
            var fondoOscuro       = document.querySelector('#hotspot-darkbg');
            var canvas            = document.querySelector('a-scene canvas');
            var overlay           = document.getElementById('transition-overlay');

            // Limpiar overlays 2D
            var fl2dOverlay = document.getElementById('flechas-2d-overlay');
            if (fl2dOverlay) { fl2dOverlay.innerHTML = ''; _flechas2D = []; }
            var hs2dOverlay = document.getElementById('hotspots-2d-overlay');
            if (hs2dOverlay) { hs2dOverlay.innerHTML = ''; _hotspots2D = []; }

            // Ocultar UI
            contenedorFlechas.setAttribute('visible', 'false');
            if (fondoOscuro) fondoOscuro.setAttribute('visible', 'false');
            document.querySelectorAll('.grupo-hotspots').forEach(function(grupo) {
                grupo.setAttribute('visible', 'false');
                grupo.querySelectorAll('.panel-activo').forEach(function(p) {
                    p.setAttribute('visible', 'false'); p.classList.remove('panel-activo');
                });
                grupo.querySelectorAll('.icono-hotspot').forEach(function(i) { i.classList.remove('clickable'); });
            });

            // Mostrar EsanLogo360.webp como overlay de transición
            var freeze = document.getElementById('freeze-overlay');
            freeze.style.backgroundImage    = 'url(imagenes/EsanLogo360.webp)';
            freeze.style.backgroundSize     = '60%';
            freeze.style.backgroundRepeat   = 'no-repeat';
            freeze.style.backgroundPosition = 'center';
            freeze.style.backgroundColor    = '#000000';
            freeze.style.transition      = 'none';
            freeze.style.opacity         = '0';
            freeze.style.display         = 'block';
            freeze.getBoundingClientRect();
            freeze.style.transition      = 'opacity 200ms ease-in';
            freeze.style.opacity         = '1';
            if (overlay) overlay.classList.add('activo');

            var _revealed = false;
            function revelarEscena() {
                if (_revealed) return;
                _revealed = true;
                _transitioning = false;
                cieloFondo.removeEventListener('materialtextureloaded', revelarEscena);
                if (overlay) overlay.classList.remove('activo');
                freeze.style.transition = 'opacity 450ms ease-out';
                freeze.style.opacity    = '0';
                setTimeout(function() { freeze.style.display = 'none'; freeze.style.backgroundImage = ''; }, 450);
                contenedorFlechas.setAttribute('visible', 'true');
                document.querySelectorAll('.yt-screen-3d[data-scene="' + nombreEscena + '"]').forEach(function(s) {
                    s.setAttribute('visible', 'true');
                    s.querySelectorAll('[yt-screen]').forEach(function (p) { p.classList.add('clickable'); });
                });
                setTimeout(function() { try { generarHotspots2D(nombreEscena); } catch(e) {} }, 400);
                actualizarActivoSidenav(nombreEscena);
                precargarAdyacentes(nombreEscena);
            }

            // Cargar nueva escena mientras la pantalla está congelada
            cieloFondo.addEventListener('materialtextureloaded', revelarEscena);
            cieloFondo.setAttribute('src', datos.imagen);
            cieloFondo.setAttribute('rotation', datos.rotacionSky || '0 -90 0');
            generarFlechas(datos.flechas);

            // Fallback de emergencia por si la textura nunca dispara el evento de carga
            setTimeout(revelarEscena, 8000);
        }


        var _flechas2D = [];
        var _flechas2DLoopRunning = false;

        function _flechas2DLoop() {
            var scene = document.querySelector('a-scene');
            var camera = scene && scene.camera;
            if (camera) {
                var W = window.innerWidth, H = window.innerHeight;
                var v = new THREE.Vector3();
                _flechas2D.forEach(function(s) {
                    v.copy(s.pos3D).project(camera);
                    if (v.z > 1) {
                        s.el.style.visibility = 'hidden';
                    } else {
                        s.el.style.visibility = 'visible';
                        s.el.style.left = ((v.x + 1) / 2 * W) + 'px';
                        s.el.style.top  = ((-v.y + 1) / 2 * H) + 'px';
                    }
                });
            }
            requestAnimationFrame(_flechas2DLoop);
        }

        function generarFlechas(listaFlechas) {
            var overlay = document.getElementById('flechas-2d-overlay');
            overlay.innerHTML = '';
            _flechas2D = [];

            listaFlechas.forEach(function(flecha) {
                var pos = flecha.position.trim().split(/\s+/);
                var pos3D = new THREE.Vector3(parseFloat(pos[0]), parseFloat(pos[1]), parseFloat(pos[2]));

                var nombreLugar = (flecha.label || nombresDestinos[flecha.target] || flecha.target).replace(/\n/g, ' ');

                // Rotacion segun imgSrc (0=arriba, 90=derecha, 180=abajo, -90=izquierda)
                var rot = 0;
                if (flecha.imgSrc === '#img-flecha-derecha')   rot = 90;
                else if (flecha.imgSrc === '#img-flecha-abajo') rot = 180;
                else if (flecha.imgSrc === '#img-flecha-izquierda') rot = -90;

                // Flecha apuntando ARRIBA (rot=0), borde negro degradé
                var svgFlecha = '<svg width="48" height="37" viewBox="0 0 56 44" fill="none" style="transform:rotate(' + rot + 'deg)">' +
                    '<path d="M5 40 L28 6 L51 40" stroke="#FFFFFF" stroke-width="11" stroke-linecap="butt" stroke-linejoin="miter"/>' +
                    '</svg>';

                var div = document.createElement('div');
                div.className = 'flecha-2d';
                div.innerHTML = svgFlecha + '<div class="flecha-label">' + nombreLugar + '</div>';

                (function(target, mirar) {
                    div.addEventListener('click', function() {
                        if (!_isDragging && !_transitioning) iniciarTransicion(target, mirar);
                    });
                    div.addEventListener('mouseenter', function() {
                        var dest = escenas[target];
                        if (dest && dest.imagen && !dest.imagen.startsWith('#') && !_preCache[dest.imagen]) {
                            _preCache[dest.imagen] = true;
                            var img = new Image(); img.src = dest.imagen;
                        }
                    });
                })(flecha.target, flecha.mirarAlLlegar);

                overlay.appendChild(div);
                _flechas2D.push({ el: div, pos3D: pos3D });
            });

            if (!_flechas2DLoopRunning) {
                _flechas2DLoopRunning = true;
                _flechas2DLoop();
            }
        }

            btnEnlace.addEventListener('click', function () { window.location.href = 'https://esanlabs.github.io/Doble-videos-Esan/'; });

            btnEnlace.addEventListener('mouseenter', function () {

        var _menuBuilt = false;
        function toggleMenu3D() {
            if (!_menuBuilt) {
                construirMenu3D();
                _menuBuilt = true;
            }
            var menu = document.querySelector('#menu-3d');
            var cam = document.querySelector('#camara-principal');
            var btn2D = document.getElementById('btn-menu-2d');
            var isVisible = menu.getAttribute('visible');

            if (!isVisible) {
                var cam3D = cam.getObject3D('camera');
                if (cam3D) {
                    var posCamara = new THREE.Vector3();
                    cam3D.getWorldPosition(posCamara);
                    var vectorDireccion = new THREE.Vector3();
                    cam3D.getWorldDirection(vectorDireccion);
                    vectorDireccion.multiplyScalar(4.5);
                    var nuevaPosicion = posCamara.clone().add(vectorDireccion);
                    menu.setAttribute('position', nuevaPosicion);
                    menu.setAttribute('billboard', '');
                }
                menu.setAttribute('visible', 'true');
                if (btn2D) btn2D.innerText = 'Cerrar Menu de Navegacion';
                var botonesMenu = menu.querySelectorAll('.menu-btn');
                botonesMenu.forEach(b => b.classList.add('clickable'));
            } else {
                menu.setAttribute('visible', 'false');
                if (btn2D) btn2D.innerText = 'Abrir Menu de Navegacion';
                var botonesMenu = menu.querySelectorAll('.menu-btn');
                botonesMenu.forEach(b => b.classList.remove('clickable'));
            }
        }

        window.onload = function () {
            var datos      = escenas['fuera'];
            var cieloFondo = document.querySelector('#cielo-fondo');
            var videoEl    = document.getElementById('video-intro-player');
            var overlayEl  = document.getElementById('video-intro');

            var _escenaMostrada = false;

            // Paso 3: video terminó → activar hotspots y animación de cámara
            function mostrarEscena() {
                if (_escenaMostrada) return;
                _escenaMostrada = true;
                _transitioning = false;
                _appReady = true;
                precargarTodo('fuera');
                try { generarHotspots2D('fuera'); } catch(e) {}
                setTimeout(aplicarMarcosPaneles, 200);
                setTimeout(function() {
                    var rig = document.getElementById('rig');
                    if (rig) rig.setAttribute('animation__intro',
                        'property: rotation; from: 0 180 0; to: 0 0 0; dur: 2800; easing: easeInOutCubic');
                }, 400);
            }

            // Paso 2: loader se oculta → mostrar video dentro de la web
            function mostrarVideo() {
                if (!videoEl || !overlayEl) { mostrarEscena(); return; }
                overlayEl.style.display = 'flex';
                // Fade in del video
                requestAnimationFrame(function() {
                    requestAnimationFrame(function() {
                        overlayEl.style.opacity = '1';
                    });
                });
                var promise = videoEl.play();
                if (promise) promise.catch(function() {});

                var _terminado = false;
                function terminarVideo() {
                    if (_terminado) return; _terminado = true;
                    overlayEl.style.opacity = '0';
                    setTimeout(function() {
                        overlayEl.style.display = 'none';
                        mostrarEscena();
                    }, 600);
                }
                videoEl.addEventListener('ended', terminarVideo);
                videoEl.addEventListener('error', terminarVideo);
                overlayEl.addEventListener('click', terminarVideo); // clic para saltar
                setTimeout(terminarVideo, 60000); // fallback 60s
            }

            // Paso 1: cargar el cielo → cuando esté listo, ocultar loader y mostrar video
            cieloFondo.setAttribute('src', datos.imagen);
            cieloFondo.setAttribute('rotation', datos.rotacionSky || '0 -90 0');
            generarFlechas(datos.flechas);

            var _skyDone = false;
            function onSkyListo() {
                if (_skyDone) return; _skyDone = true;
                ocultarLoader();
                mostrarVideo();
            }
            cieloFondo.addEventListener('materialtextureloaded', function onLoad() {
                cieloFondo.removeEventListener('materialtextureloaded', onLoad);
                onSkyListo();
            });
            setTimeout(onSkyListo, 10000); // fallback 10s

            document.getElementById('btn-menu-2d').addEventListener('click', showMenu2D);
            document.getElementById('ic-close-btn').addEventListener('click', hideCard2D);
            document.getElementById('card-backdrop').addEventListener('click', hideCard2D);
            document.getElementById('sidenav-toggle').addEventListener('click', function() { toggleSidenav(); });
            buildSidenav();
            actualizarActivoSidenav('fuera');
            if (window.innerWidth < 640) toggleSidenav(true);

            var darkbg = document.querySelector('#hotspot-darkbg');
            if (darkbg) {
                darkbg.addEventListener('click', function () {
                    var panelActivo = document.querySelector('.panel-activo');
                    if (panelActivo) {
                        panelActivo.setAttribute('visible', 'false');
                        panelActivo.classList.remove('panel-activo');
                    }
                    darkbg.setAttribute('visible', 'false');
                    var flechas = document.querySelector('#flechas-container');
                    if (flechas) flechas.setAttribute('visible', 'true');
                });
            }

            var btnCapturar = document.getElementById('btn-capturar');
            if (btnCapturar) btnCapturar.addEventListener('click', function () {
                var cam = document.querySelector('#camara-principal').getObject3D('camera');
                if (!cam) return;

                var vectorDireccion = new THREE.Vector3();
                cam.getWorldDirection(vectorDireccion);

                var distancia = 12;

                var posX = (vectorDireccion.x * distancia).toFixed(2);
                var posY = (vectorDireccion.y * distancia).toFixed(2);
                var posZ = (vectorDireccion.z * distancia).toFixed(2);

                var anguloRad = Math.atan2(vectorDireccion.x, vectorDireccion.z);
                var rotY = Math.round(anguloRad * (180 / Math.PI));

                var codigoGenerado = `{ target: 'DESTINO', position: '${posX} ${posY} ${posZ}', rotation: '0 ${rotY} 0' },`;

                navigator.clipboard.writeText(codigoGenerado).then(function () {
                    alert("¡Cartel capturado en tu portapapeles!\n\n" + codigoGenerado + "\n\nPegalo en tu código.");
                }).catch(function () {
                    prompt("Copia este código:", codigoGenerado);
                });
                console.log("%c NUEVA COORDENADA CAPTURADA", "color: #E3173E; font-size: 16px; font-weight: bold;");
                console.log(codigoGenerado);
            });
        };

        var _marcosAplicados = false;
        function aplicarMarcosPaneles() {
            return; 
        }

        var _loaderOculto = false;
        function ocultarLoader() {
            if (_loaderOculto) return;
            _loaderOculto = true;
            var loader = document.getElementById('pantalla-carga');
            if (loader) {
                loader.classList.add('oculto');
                setTimeout(() => {
                    loader.style.display = 'none';
                    window.dispatchEvent(new Event('resize'));
                }, 1000);
            }
        }

        const _preCache = {};
        function precargarAdyacentes(nombreEscena) {
            var datos = escenas[nombreEscena];
            if (!datos || !datos.flechas) return;
            datos.flechas.forEach(function (flecha) {
                var destino = escenas[flecha.target];
                if (!destino) return;
                var src = destino.imagen;
                if (!src || src.startsWith('#') || _preCache[src]) return;
                _preCache[src] = true;
                var img = new Image();
                img.src = src;
            });
        }

        function precargarTodo(escenaActual) {
            // Adyacentes primero (prioridad alta), luego el resto con pequeño delay
            precargarAdyacentes(escenaActual);
            var cola = [];
            Object.keys(escenas).forEach(function(nombre) {
                var src = escenas[nombre].imagen;
                if (!src || src.startsWith('#') || _preCache[src]) return;
                cola.push(src);
            });
            var i = 0;
            function siguiente() {
                if (i >= cola.length) return;
                var src = cola[i++];
                if (_preCache[src]) { siguiente(); return; }
                _preCache[src] = true;
                var img = new Image();
                img.onload = img.onerror = function() { setTimeout(siguiente, 100); };
                img.src = src;
            }
            setTimeout(siguiente, 2000); // empieza 2s después de cargar la primera escena
        }

        /* ── 2D CARD ─────────────────────────────────────────── */
        window.panelData = {};

        function showCard2D(panelId) {
            if (!_appReady) return;
            var id = panelId.replace(/^#/, '');
            var data = window.panelData[id];
            if (!data) return;

            var imgEl    = document.getElementById('ic-img');
            var titleEl  = document.getElementById('ic-title');
            var descEl   = document.getElementById('ic-desc');
            var card     = document.getElementById('info-card-2d');
            var backdrop = document.getElementById('card-backdrop');

            titleEl.textContent = data.titulo;
            descEl.textContent  = data.desc;

            if (data.imagen) {
                imgEl.src = data.imagen;
                imgEl.style.objectPosition = data.imagenPos || 'center';
                imgEl.style.display = 'block';
            } else {
                imgEl.style.display = 'none';
            }

            card.classList.add('visible');
            backdrop.classList.add('visible');
        }

        function hideCard2D() {
            document.getElementById('info-card-2d').classList.remove('visible');
            document.getElementById('card-backdrop').classList.remove('visible');
        }

        /* ── 2D HOTSPOTS ──────────────────────────────────────── */
        var _hotspots2D = [];
        var _hotspots2DLoopRunning = false;

        function _hotspots2DLoop() {
            var scene = document.querySelector('a-scene');
            var camera = scene && scene.camera;
            if (camera) {
                var W = window.innerWidth, H = window.innerHeight;
                var v = new THREE.Vector3();
                _hotspots2D.forEach(function(s) {
                    v.copy(s.pos3D).project(camera);
                    if (v.z > 1) {
                        s.el.style.visibility = 'hidden';
                    } else {
                        s.el.style.visibility = 'visible';
                        s.el.style.left = ((v.x + 1) / 2 * W) + 'px';
                        s.el.style.top  = ((-v.y + 1) / 2 * H) + 'px';
                    }
                });
            }
            requestAnimationFrame(_hotspots2DLoop);
        }

        function generarHotspots2D(sceneName) {
            var overlay = document.getElementById('hotspots-2d-overlay');
            overlay.innerHTML = '';
            _hotspots2D = [];

            var grupo = document.getElementById('hotspots-' + sceneName);
            if (!grupo) return;

            grupo.querySelectorAll('.icono-hotspot').forEach(function(icono) {
                var posAttr = icono.getAttribute('position');
                if (!posAttr) return;

                var pos3D;
                if (typeof posAttr === 'string') {
                    var p = posAttr.trim().split(/\s+/);
                    pos3D = new THREE.Vector3(parseFloat(p[0]), parseFloat(p[1]), parseFloat(p[2]));
                } else {
                    pos3D = new THREE.Vector3(posAttr.x || 0, posAttr.y || 0, posAttr.z || 0);
                }

                var hotsData = icono.getAttribute('hotspot-info');
                var targetId = '';
                if (typeof hotsData === 'string') {
                    var m = hotsData.match(/target:\s*([^;]+)/);
                    if (m) targetId = m[1].trim();
                } else if (hotsData && hotsData.target) {
                    targetId = hotsData.target;
                }

                var div = document.createElement('div');
                div.className = 'hotspot-2d';
                div.innerHTML = '<svg width="36" height="36" viewBox="0 0 44 44"><circle cx="22" cy="22" r="21" fill="#FF0000"/><text x="22" y="29" text-anchor="middle" fill="white" font-size="22" font-weight="bold" font-family="Arial">i</text></svg>';

                if (targetId) {
                    (function(tid) {
                        div.addEventListener('click', function() { showCard2D(tid); });
                    })(targetId);
                }

                overlay.appendChild(div);
                _hotspots2D.push({ el: div, pos3D: pos3D });
            });

            if (!_hotspots2DLoopRunning) {
                _hotspots2DLoopRunning = true;
                _hotspots2DLoop();
            }
        }

        /* ── SIDE NAV ─────────────────────────────────────────── */
        var _escenaActual = 'entrada';
        var _sidenavBuilt = false;

        var _categoriasNav = [
            { nombre: 'Exteriores',       escenas: ['fuera','entrada','jardin','fuente','capilla','voley','basquet','explanada','ecoesan'] },
            { nombre: 'Eventos y Cultura', escenas: ['eventos','butacas','danza'] },
            { nombre: 'Académico',         escenas: ['aula','biblioteca','edificioA','edificioD'] },
            { nombre: 'Laboratorios',      escenas: ['fisica','quimica','conducta','laboratorio','datalab','robotica','fablab','fablab2'] },
            { nombre: 'Sala de Estudios',  escenas: ['estudio_pregrado','estudio_mba','estudio_magister','descanso_magister'] },
            { nombre: 'Servicios',         escenas: ['cafeteriaa','cafeteria_interior'] }
        ];

        function buildSidenav() {
            if (_sidenavBuilt) return;
            _sidenavBuilt = true;
            var body = document.getElementById('sidenav-body');
            _categoriasNav.forEach(function(cat) {
                var validos = cat.escenas.filter(function(k) { return escenas[k]; });
                if (!validos.length) return;
                var catEl = document.createElement('div');
                catEl.className = 'sidenav-cat cerrada';
                var hdr = document.createElement('div');
                hdr.className = 'sidenav-cat-header';
                hdr.innerHTML = cat.nombre + ' <span class="sidenav-cat-arrow">▼</span>';
                hdr.addEventListener('click', function() { catEl.classList.toggle('cerrada'); });
                catEl.appendChild(hdr);
                var items = document.createElement('div');
                items.className = 'sidenav-items';
                validos.forEach(function(key) {
                    var btn = document.createElement('button');
                    btn.className = 'sidenav-item';
                    btn.id = 'snav-' + key;
                    btn.textContent = nombresDestinos[key] || key;
                    btn.addEventListener('click', function() {
                        if (_transitioning) return;
                        iniciarTransicion(key, '0 0 0');
                        if (window.innerWidth < 640) toggleSidenav(true);
                    });
                    items.appendChild(btn);
                });
                catEl.appendChild(items);
                body.appendChild(catEl);
            });
        }

        function actualizarActivoSidenav(nombreEscena) {
            _escenaActual = nombreEscena;
            document.querySelectorAll('.sidenav-item').forEach(function(el) { el.classList.remove('activo'); });
            var activo = document.getElementById('snav-' + nombreEscena);
            if (activo) {
                activo.classList.add('activo');
                var cat = activo.closest('.sidenav-cat');
                if (cat) cat.classList.remove('cerrada');
                activo.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            }
        }

        function toggleSidenav(forzarCerrar) {
            var nav = document.getElementById('sidenav');
            var toggle = document.getElementById('sidenav-toggle');
            var cerrado = forzarCerrar !== undefined ? forzarCerrar : !nav.classList.contains('cerrado');
            nav.classList.toggle('cerrado', cerrado);
            toggle.textContent = cerrado ? '❯' : '❮';
        }

        function showMenu2D() { toggleSidenav(false); }
        function hideMenu2D() { toggleSidenav(true); }

        <script>
        (function () {
            var S = 128;

            function dibujarLogoPiso(ctx) {
                var cx = 256, cy = 256, r = 248;

                function base() {
                    ctx.clearRect(0, 0, 512, 512);
                }

                base();

                var img = new Image();
                img.onload = function () {
                    base();
                    var zoom = 1.02;
                    var offset = (512 - 512 * zoom) / 2;
                    ctx.drawImage(img, offset,  offset, 512 * zoom, 512 * zoom);
                    var el = document.getElementById('logo-piso');
                    if (el) {
                        var mesh = el.getObject3D('mesh');
                        if (mesh && mesh.material && mesh.material.map) {
                            mesh.material.map.needsUpdate = true;
                        }
                    }
                };
                img.src = 'imagenes/pisoLogo.webp';
            }

            function dibujarInfo(ctx) {
                ctx.fillStyle = '#FF0000';
                ctx.beginPath(); ctx.arc(64, 64, 58, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#FFFFFF';
                ctx.font = 'bold 72px Arial';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('i', 64, 68);
            }

            function dibujarLogo(ctx) {
                var cx = 256;
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(0, 0, 512, 512);
                ctx.fillStyle = '#888888';
                ctx.font = 'bold 38px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('UN', cx, 168);
                ctx.fillStyle = '#E3173E';
                ctx.font = 'bold 200px Arial';
                ctx.fillText('e', cx, 310);
            }

            function dibujarFlecha(ctx, rot) {
                ctx.save();
                ctx.translate(S / 2, S / 2);
                ctx.rotate(rot * Math.PI / 180);
                ctx.translate(-S / 2, -S / 2);
                ctx.lineJoin = 'round'; ctx.lineCap = 'round';
                ctx.strokeStyle = 'rgba(0,0,0,0.45)'; ctx.lineWidth = 34;
                ctx.beginPath(); ctx.moveTo(19, 76); ctx.lineTo(50, 28); ctx.lineTo(81, 76); ctx.stroke();
                ctx.strokeStyle = '#E3173E'; ctx.lineWidth = 26;
                ctx.beginPath(); ctx.moveTo(17, 74); ctx.lineTo(50, 28); ctx.lineTo(83, 74); ctx.stroke();
                ctx.strokeStyle = '#FFFFFF'; ctx.lineWidth = 14;
                ctx.beginPath(); ctx.moveTo(17, 74); ctx.lineTo(50, 28); ctx.lineTo(83, 74); ctx.stroke();
                ctx.restore();
            }

            function dibujarYtPlay(ctx) {
                var W = 512, H = 320;
                ctx.clearRect(0, 0, W, H);
                // Botón YouTube (rectángulo rojo redondeado) - más grande
                var bx = 80, by = 56, bw = 352, bh = 208, br = 32;
                ctx.fillStyle = '#FF0000';
                ctx.beginPath();
                ctx.moveTo(bx + br, by);
                ctx.lineTo(bx + bw - br, by);
                ctx.arcTo(bx + bw, by, bx + bw, by + br, br);
                ctx.lineTo(bx + bw, by + bh - br);
                ctx.arcTo(bx + bw, by + bh, bx + bw - br, by + bh, br);
                ctx.lineTo(bx + br, by + bh);
                ctx.arcTo(bx, by + bh, bx, by + bh - br, br);
                ctx.lineTo(bx, by + br);
                ctx.arcTo(bx, by, bx + br, by, br);
                ctx.closePath();
                ctx.fill();
                // Triángulo play blanco centrado - más grande
                var cx = W / 2, cy = H / 2;
                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath();
                ctx.moveTo(cx - 52, cy - 58);
                ctx.lineTo(cx - 52, cy + 58);
                ctx.lineTo(cx + 72, cy);
                ctx.closePath();
                ctx.fill();
            }

            [
                ['img-logo', function (c) { dibujarLogoPiso(c); }],
                ['img-info-icon',      function (c) { dibujarInfo(c); }],
                ['img-flecha-plana',   function (c) { dibujarFlecha(c, 0); }],
                ['img-flecha-derecha', function (c) { dibujarFlecha(c, 90); }],
                ['img-flecha-abajo',   function (c) { dibujarFlecha(c, 180); }],
                ['img-flecha-izquierda', function (c) { dibujarFlecha(c, -90); }],
                ['img-yt-play', function (c) { dibujarYtPlay(c); }]
            ].forEach(function (d) {
                var el = document.getElementById(d[0]);
                if (!el) return;
                var ctx = el.getContext('2d');
                ctx.clearRect(0, 0, el.width, el.height);
                d[1](ctx);
            });
        })();
        </script>

    <!-- populate panelData before card-style setTimeout strips a-text elements -->
    <script>
    (function () {
        document.querySelectorAll('[id^="panel-info-"]').forEach(function (panel) {
            var id = panel.id;
            var grupo = panel.closest('.grupo-hotspots');
            var sceneName = grupo ? grupo.id.replace('hotspots-', '') : '';
            var textos = Array.from(panel.querySelectorAll('a-text')).filter(function (t) {
                var par = t.parentElement;
                while (par && par !== panel) {
                    if (par.classList && par.classList.contains('close-btn')) return false;
                    par = par.parentElement;
                }
                return true;
            });
            var titulo = textos[0] ? (textos[0].getAttribute('value') || '') : '';
            var desc   = textos[1] ? (textos[1].getAttribute('value') || '') : '';
            var imagenOverride = panel.getAttribute('data-imagen');
            var escenaData = escenas[sceneName];
            var imagen = imagenOverride || (escenaData ? escenaData.imagen : '');
            if (imagen && imagen.startsWith('#')) {
                var assetEl = document.getElementById(imagen.slice(1));
                imagen = assetEl ? assetEl.src : '';
            }
            var imagenPos = panel.getAttribute('data-imagen-pos') || 'center';
            window.panelData[id] = { titulo: titulo, desc: desc, imagen: imagen, sceneName: sceneName, imagenPos: imagenPos };
        });
    })();
    </script>

    </div>
    <div id="dbg-btn" onclick="dbgToggle()">📐 Coords</div>

    <script>
        var dbgOn = false, dbgRaf = null;
        function dbgToggle() {
            dbgOn = !dbgOn;
            document.getElementById('dbg-panel').classList.toggle('on', dbgOn);
            document.getElementById('dbg-btn').style.background = dbgOn ? 'rgba(0,150,60,0.9)' : 'rgba(0,0,0,0.75)';
            if (dbgOn) {
                dbgRaf = requestAnimationFrame(dbgTick);
                document.querySelector('a-scene').addEventListener('click', dbgClick);
            } else {
                cancelAnimationFrame(dbgRaf);
                document.querySelector('a-scene').removeEventListener('click', dbgClick);
            }
        }
        function dbgTick() {
            var cam = document.getElementById('camara-principal');
            if (cam) {
                var r = cam.getAttribute('rotation');
                document.getElementById('dbg-y').textContent = r.y.toFixed(2);
                document.getElementById('dbg-x').textContent = r.x.toFixed(2);
            }
            dbgRaf = requestAnimationFrame(dbgTick);
        }
        function dbgClick(e) {
            var pt = e.detail && e.detail.intersection && e.detail.intersection.point;
            if (!pt) return;
            // Normaliza a dist=12 en XZ, Y fijo a 2 (altura ideal de flecha)
            var dist = 12;
            var mag = Math.sqrt(pt.x * pt.x + pt.z * pt.z) || 1;
            var nx = (pt.x / mag * dist).toFixed(2);
            var nz = (pt.z / mag * dist).toFixed(2);
            var txt = nx + ' 2 ' + nz;
            var full = "{ target: 'DESTINO', position: '" + txt + "', rotation: '0 0 0' },";
            document.getElementById('dbg-pos').textContent = txt;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(full).then(function () {
                    dbgToast('Copiado: ' + full);
                }).catch(function () { prompt('Copia esto:', full); });
            } else {
                prompt('Copia esto:', full);
            }
        }
        function dbgToast(msg) {
            var t = document.getElementById('dbg-toast');
            if (!t) {
                t = document.createElement('div');
                t.id = 'dbg-toast';
                t.style.cssText = 'position:fixed;bottom:60px;right:12px;background:#00AA44;color:#fff;font-family:monospace;font-size:12px;padding:7px 12px;border-radius:6px;z-index:9999;pointer-events:none;';
                document.body.appendChild(t);
            }
            t.textContent = msg;
            t.style.display = 'block';
            clearTimeout(t._to);
            t._to = setTimeout(function () { t.style.display = 'none'; }, 2500);
        }
    </script>
